<!DOCTYPE html>
<html>
<head>

<title>Fisheries AI Assistant</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

.container{
width:700px;
margin:auto;
margin-top:60px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

#chatbox{
height:320px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:20px;
text-align:left;
}

.input-area{
display:flex;
gap:10px;
justify-content:center;
}

input{
width:85%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 20px;
background:#0b7dda;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#095fa8;
}

</style>

</head>

<body>

<div class="container">

<h2>🐟 Fisheries AI Assistant</h2>

<div id="chatbox"></div>

<div class="input-area">

<input 
id="question" 
placeholder="Ask about fisheries schemes, states, fish species..."
>

<button onclick="sendMessage()">Send</button>

</div>

</div>


<script>

async function sendMessage(){

let question = document.getElementById("question").value

if(question.trim() === ""){
return
}

let response = await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
message: question
})

})

let data = await response.json()

let chat = document.getElementById("chatbox")

chat.innerHTML += "<p><b>You:</b> "+question+"</p>"
chat.innerHTML += "<p><b>AI:</b> "+data.answer+"</p>"

document.getElementById("question").value=""

chat.scrollTop = chat.scrollHeight

}

</script>

</body>
</html>
