<!DOCTYPE html>
<html>
<head>
<title>Fisheries AI Assistant</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

.container{
width:600px;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

#chatbox{
height:300px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

<select id="filter">
<option value="all">All</option>
<option value="state">State</option>
<option value="species">Fish Species</option>
<option value="scheme">Scheme</option>
</select>

input{
width:70%;
padding:10px;
}

button{
padding:10px 15px;
background:#0b7dda;
color:white;
border:none;
}
</style>

</head>

<body>

<div class="container">

<h2>🐟 Fisheries AI Assistant</h2>

<div id="chatbox"></div>

<input id="question" placeholder="Ask about fisheries schemes, states, ponds...">

<button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

let question = document.getElementById("question").value

let response = await fetch("/chat",{

method:"POST",
a
headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
message: question,
filter: document.getElementById("filter").value
})

})

let data = await response.json()

let chat = document.getElementById("chatbox")

chat.innerHTML += "<p><b>You:</b> "+question+"</p>"
chat.innerHTML += "<p><b>AI:</b> "+data.answer+"</p>"

document.getElementById("question").value=""

}

</script>

</body>
</html>
